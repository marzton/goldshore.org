name: Deploy goldshore-org (production)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy goldshore-org to Pages main branch
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build goldshore-org
        run: pnpm --filter @goldshore/web build

      - name: Deploy production to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy apps/goldshore-web/dist \
            --project-name goldshore-org \
            --branch main
