name: Preview deploy gs-admin

on:
  pull_request:
    paths:
      - "apps/gs-admin/**"
      - ".github/workflows/preview-gs-admin.yml"
  workflow_dispatch:

jobs:
  preview:
    name: Deploy gs-admin preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate gs-admin app path
        run: |
          if [ ! -d "apps/gs-admin" ]; then
            echo "::error::Expected app path apps/gs-admin was not found in this branch."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build gs-admin
        run: npm run build --workspace apps/gs-admin

      - name: Deploy preview to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_BRANCH: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
        run: |
          npx wrangler pages deploy apps/gs-admin/dist \
            --project-name gs-admin \
            --branch "${PREVIEW_BRANCH}"
