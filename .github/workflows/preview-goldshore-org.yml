name: Preview deploy goldshore-org

on:
  pull_request:
    paths:
      - "apps/goldshore-web/**"
      - ".github/workflows/preview-goldshore-org.yml"
  workflow_dispatch:

jobs:
  preview:
    name: Deploy goldshore-org preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build goldshore-org
        run: pnpm run build -w @goldshore/web

      - name: Deploy preview to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_BRANCH: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
        run: |
          npx wrangler pages deploy apps/goldshore-web/dist \
            --project-name goldshore-org \
            --branch "${PREVIEW_BRANCH}"
