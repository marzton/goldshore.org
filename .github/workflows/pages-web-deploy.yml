name: Deploy Goldshore web to Cloudflare Pages

on:
  push:
    branches:
      - main
      - preview
      - dev
    paths:
      - "apps/goldshore-web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "infra/github/actions/workflows/pages-web-deploy.yml"
      - ".github/workflows/pages-web-deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: pages-web-deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: Deploy Pages (${{ github.ref_name }})
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Build @goldshore/web
        run: pnpm --filter @goldshore/web build

      - name: Resolve target environment
        id: target
        run: |
          case "${GITHUB_REF_NAME}" in
            main)
              echo "branch=main" >> "$GITHUB_OUTPUT"
              echo "environment=production" >> "$GITHUB_OUTPUT"
              echo "domain=goldshore.org" >> "$GITHUB_OUTPUT"
              ;;
            preview)
              echo "branch=preview" >> "$GITHUB_OUTPUT"
              echo "environment=preview" >> "$GITHUB_OUTPUT"
              echo "domain=preview.goldshore.org" >> "$GITHUB_OUTPUT"
              ;;
            dev)
              echo "branch=dev" >> "$GITHUB_OUTPUT"
              echo "environment=development" >> "$GITHUB_OUTPUT"
              echo "domain=dev.goldshore.org" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy apps/goldshore-web/dist \
            --project-name "${CLOUDFLARE_PAGES_PROJECT_NAME}" \
            --branch "${{ steps.target.outputs.branch }}"

      - name: Deployment summary
        run: |
          {
            echo "### Cloudflare Pages deployment"
            echo "- Environment: \`${{ steps.target.outputs.environment }}\`"
            echo "- Branch: \`${{ steps.target.outputs.branch }}\`"
            echo "- Domain target: \`${{ steps.target.outputs.domain }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
